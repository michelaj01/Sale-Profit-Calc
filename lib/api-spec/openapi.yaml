openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Profit Calculator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: items
    description: Item tracking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all items
      description: Returns all tracked items with profit calculations
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create a new item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /items/{id}:
    put:
      operationId: updateItem
      tags: [items]
      summary: Update an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /extract-amount:
    post:
      operationId: extractAmount
      tags: [items]
      summary: Extract total amount from invoice image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractAmountRequest"
      responses:
        "200":
          description: Extracted amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractAmountResponse"
        "400":
          description: Could not extract amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CostItem:
      type: object
      properties:
        label:
          type: string
        amount:
          type: number
      required:
        - label
        - amount
    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        acquisitionCost:
          type: number
        renovationCost:
          type: number
        costItems:
          type: array
          items:
            $ref: "#/components/schemas/CostItem"
        totalCost:
          type: number
        salePrice:
          type: number
        profit:
          type: number
        profitMargin:
          type: number
        roi:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - acquisitionCost
        - renovationCost
        - costItems
        - totalCost
        - salePrice
        - profit
        - profitMargin
        - roi
        - createdAt
    CreateItemRequest:
      type: object
      properties:
        name:
          type: string
        acquisitionCost:
          type: number
        renovationCost:
          type: number
        costItems:
          type: array
          items:
            $ref: "#/components/schemas/CostItem"
        salePrice:
          type: number
      required:
        - name
        - acquisitionCost
        - salePrice
    ExtractAmountRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image of the invoice or quotation
      required:
        - imageBase64
    ExtractAmountResponse:
      type: object
      properties:
        amount:
          type: number
          description: Extracted total amount in AED
        confidence:
          type: string
          description: high, medium, or low
      required:
        - amount
        - confidence
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
