kind = "web"
previewPath = "/"
title = "Profit Calculator"
version = "1.0.0"
id = "artifacts/profit-calc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21022
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/profit-calc run dev"

[services.env]
PORT = "21022"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/profit-calc", "run", "build"]
publicDir = "artifacts/profit-calc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
